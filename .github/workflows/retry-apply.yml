name: OCI Retry Apply

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configurar OCI CLI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' "${{ secrets.OCI_USER_OCID }}" "${{ secrets.OCI_FINGERPRINT }}" "${{ secrets.OCI_TENANCY_OCID }}" "${{ secrets.OCI_REGION }}" "$HOME/.oci/key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Verificar fingerprint real da chave
        run: |
          echo "--- Fingerprint configurado no Secret ---"
          echo "${{ secrets.OCI_FINGERPRINT }}"
          echo "--- Fingerprint real do arquivo .pem ---"
          openssl rsa -in ~/.oci/key.pem -pubout 2>/dev/null | openssl md5 -c 2>/dev/null || \
          openssl pkey -in ~/.oci/key.pem -pubout 2>/dev/null | openssl md5 -c

      - name: Disparar Apply na Stack
        run: |
          set +e
          echo "Disparando Apply na stack OCI..."
          oci resource-manager job create-apply-job --stack-id "${{ secrets.OCI_STACK_ID }}" --execution-plan-strategy AUTO_APPROVED --wait-for-state SUCCEEDED --wait-for-state FAILED --wait-interval-seconds 15 --max-wait-seconds 600
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "SUCESSO! Instancia criada com sucesso!"
            exit 0
          else
            echo "Falhou — proxima tentativa em 5 minutos."
            exit 1
          fi
