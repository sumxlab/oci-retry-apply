- name: Configurar OCI CLI
  env:
    OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  run: |
    mkdir -p ~/.oci

    # Corrige quebras de linha da chave privada
    echo "$OCI_PRIVATE_KEY" | sed 's/\\n/\n/g' > ~/.oci/key.pem
    chmod 600 ~/.oci/key.pem

    # Escreve o config sem usar << (conflita com YAML)
    {
      echo "[DEFAULT]"
      echo "user=${{ secrets.OCI_USER_OCID }}"
      echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
      echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
      echo "region=${{ secrets.OCI_REGION }}"
      echo "key_file=$HOME/.oci/key.pem"
    } > ~/.oci/config

    chmod 600 ~/.oci/config
    oci setup repair-file-permissions --file ~/.oci/config
    oci setup repair-file-permissions --file ~/.oci/key.pem

    echo "--- Testando autenticacao ---"
    oci iam region list --output table
