name: OCI Retry Apply

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar OCI CLI
        run: pip install oci-cli

      - name: Configurar OCI CLI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci

          python3 - <<'PYEOF'
          import os

          key = os.environ.get("OCI_PRIVATE_KEY", "")

          if "\\n" in key:
              key = key.replace("\\n", "\n")

          if not key.endswith("\n"):
              key += "\n"

          with open(os.path.expanduser("~/.oci/key.pem"), "w") as f:
              f.write(key)

          print("Chave salva com sucesso.")
          print(f"Total de linhas: {len(key.splitlines())}")
          PYEOF

          chmod 600 ~/.oci/key.pem

          {
            echo "[DEFAULT]"
            echo "user=$OCI_USER"
            echo "fingerprint=$OCI_FINGERPRINT"
            echo "tenancy=$OCI_TENANCY"
            echo "region=$OCI_REGION"
            echo "key_file=$HOME/.oci/key.pem"
          } > ~/.oci/config

          chmod 600 ~/.oci/config
          echo "--- Testando autenticacao ---"
          oci iam region list --output table

      - name: Disparar Apply na Stack
        run: |
          set +e
          OUTPUT=$(oci resource-manager job create-apply-job \
            --stack-id "${{ secrets.OCI_STACK_ID }}" \
            --execution-plan-strategy AUTO_APPROVED \
            --wait-for-state SUCCEEDED \
            --wait-for-state FAILED \
            --wait-interval-seconds 15 \
            --max-wait-seconds 600)

          LIFECYCLE=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['lifecycle-state'])")
          echo "Estado final do job: $LIFECYCLE"

          if [ "$LIFECYCLE" = "SUCCEEDED" ]; then
            echo "SUCESSO! Instancia criada!"
            exit 0
          else
            ERRO=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print(d.get('failure-details', {}).get('message', 'sem detalhes'))")
            echo "Falhou: $ERRO"
            echo "Proxima tentativa em 5 minutos."
            exit 1
          fi
