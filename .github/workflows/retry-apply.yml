name: OCI Retry Apply

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

    steps:
      - name: Testar autenticacao
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: 'iam region list --output table'
          silent: false

      - name: Disparar Apply na Stack
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        id: apply-job
        with:
          command: >-
            resource-manager job create-apply-job
            --stack-id ${{ secrets.OCI_STACK_ID }}
            --execution-plan-strategy AUTO_APPROVED
            --wait-for-state SUCCEEDED
            --wait-for-state FAILED
            --wait-interval-seconds 15
            --max-wait-seconds 600
          silent: false

      - name: Verificar resultado
        run: |
          echo "Job finalizado."
          echo "Output: ${{ steps.apply-job.outputs.output }}"
